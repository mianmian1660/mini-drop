# ============================================================
# rules.yaml — 性能优化规则库
# ============================================================
# 这个文件定义了 AnalysisAdvisor 使用的优化建议规则。
# 每条规则包含：
#   regex: 正则表达式，用于匹配热点函数名
#   advice: 匹配成功后给出的中文优化建议
#
# 你可以自由扩展这个文件来添加新的优化规则。
# 规则按顺序匹配，一个函数可能命中多条规则（建议会合并）。
#
# YAML 语法小课堂：
#   - item      = 数组元素
#   key: value  = 键值对
#   "..."       = 字符串（含特殊字符时加引号）
# ============================================================

rules:
  # ----------------------------------------------------------
  # 内存分配相关
  # ----------------------------------------------------------
  - regex: ".*malloc.*|.*calloc.*|.*realloc.*|.*free.*|.*mmap.*"
    advice: |
      检测到频繁内存分配/释放，建议：
      1. 使用 **jemalloc** 或 **tcmalloc** 替代默认 malloc，可提升 20-40% 的多线程内存分配性能
      2. 引入**对象池**（object pool）复用已分配对象，减少 malloc/free 调用次数
      3. 使用 `valgrind --tool=massif` 检查是否存在内存泄漏

  # ----------------------------------------------------------
  # 锁竞争相关
  # ----------------------------------------------------------
  - regex: ".*pthread_mutex_lock.*|.*futex.*|.*__lll_lock.*|.*__spin_lock.*"
    advice: |
      检测到锁竞争热点，建议：
      1. **缩小临界区**范围，将不需要加锁的代码移出 mutex 保护
      2. 使用**无锁数据结构**（lock-free queue/stack），如 Boost.Lockfree
      3. 对读多写少场景，用 **读写锁**（pthread_rwlock）替代互斥锁
      4. 检查是否存在**死锁风险**（使用 `lockdep` 或 `helgrind` 检测）

  # ----------------------------------------------------------
  # Python 解释器
  # ----------------------------------------------------------
  - regex: ".*_PyEval_EvalFrameDefault.*|.*PyEval_EvalCode.*"
    advice: |
      Python 解释器主循环耗时较高，建议：
      1. 将热点代码用 **Cython** 改写为 C 扩展（可提速 10-100 倍）
      2. 尝试 **PyPy** 替代 CPython（对纯 Python 计算可提速 4-8 倍）
      3. 使用 `__slots__` 减少对象内存开销和属性查找时间
      4. 避免在循环内使用 `.` 属性访问，缓存为局部变量

  # ----------------------------------------------------------
  # JSON 处理
  # ----------------------------------------------------------
  - regex: ".*[Jj][Ss][Oo][Nn].*|.*_json_.*"
    advice: |
      JSON 序列化/反序列化开销较大，建议：
      1. 使用 **orjson**（最快，3-5x）或 **ujson** 替代标准 json 库
      2. 对大 JSON 使用 `ijson` 流式解析，避免全量加载到内存
      3. 考虑使用 **protobuf** 或 **msgpack** 等二进制格式（体积更小，解析更快）
      4. 对重复 JSON 结构缓存序列化/反序列化的 schema

  # ----------------------------------------------------------
  # 加密/哈希运算
  # ----------------------------------------------------------
  - regex: ".*SHA.*|.*MD5.*|.*AES.*|.*EVP_.*|.*_hashlib.*"
    advice: |
      加密/哈希运算占用较高 CPU，建议：
      1. 检查是否可以减少加密轮次或使用更快的算法（如 BLAKE3 替代 SHA-256）
      2. 确认已启用硬件加速指令：**AES-NI** / **SHA-NI**（`grep -o aes /proc/cpuinfo`）
      3. 复用 TLS/SSL 会话（session resumption）减少握手开销
      4. 对不需要安全性的场景使用 **xxHash** 或 **CityHash** 替代 SHA

  # ----------------------------------------------------------
  # 字符串/内存操作
  # ----------------------------------------------------------
  - regex: ".*strcmp.*|.*strcpy.*|.*memcpy.*|.*memset.*|.*strlen.*"
    advice: |
      字符串/内存操作频繁，建议：
      1. 确保使用 **-O2** 或 **-O3** 编译，编译器会自动内联和优化这些函数
      2. 对已知长度的字符串用 `memcpy` 替代 `strcpy`（避免逐字节扫描）
      3. 不在循环内重复调用 `strlen()`，提前计算并缓存长度
      4. 对齐内存地址以获得更好的 SIMD 优化

  # ----------------------------------------------------------
  # 系统调用
  # ----------------------------------------------------------
  - regex: ".*syscall.*|.*__x64_sys_.*|.*do_syscall.*|.*entry_SYSCALL.*"
    advice: |
      系统调用频率较高，建议：
      1. 使用 **readv/writev**（scatter-gather I/O）批量处理多个 buffer
      2. 考虑 **io_uring**（Linux 5.1+）替代传统 read/write 减少上下文切换
      3. 合并小 I/O 为大块 I/O（buffered I/O），减少系统调用次数

  # ----------------------------------------------------------
  # 网络 I/O
  # ----------------------------------------------------------
  - regex: ".*tcp_sendmsg.*|.*tcp_recvmsg.*|.*udp_sendmsg.*|.*__netif_.*"
    advice: |
      网络 I/O 占用较高，建议：
      1. 使用 **零拷贝** 技术：`sendfile()` / `splice()` 减少内核-用户态数据拷贝
      2. 启用 **TCP_NODELAY**（禁用 Nagle 算法）减少小包延迟
      3. 增大 socket buffer（`SO_RCVBUF` / `SO_SNDBUF`）减少丢包和重传
      4. 使用 **DPDK** 或 **XDP** 旁路内核网络栈（适用于高吞吐场景）

  # ----------------------------------------------------------
  # 正则表达式
  # ----------------------------------------------------------
  - regex: ".*[Rr]egex.*|.*pcre_.*|.*re_match.*"
    advice: |
      正则表达式开销较大，建议：
      1. **预编译**正则表达式（`re.compile()`），避免每次匹配时重新解析
      2. 检查是否存在**灾难性回溯**（catastrophic backtracking），用 `regex101.com` 分析
      3. 对简单匹配使用 `str.find()` / `str.startswith()` / `str.endswith()` 替代正则
      4. 使用 **RE2**（Google）保证线性时间匹配，避免回溯

  # ----------------------------------------------------------
  # 日志输出
  # ----------------------------------------------------------
  - regex: ".*[Ll]og.*|.*printf.*|.*fprintf.*|.*vfprintf.*|.*syslog.*"
    advice: |
      日志输出占用 CPU，建议：
      1. 使用**异步日志**库（spdlog / glog / Log4cxx），避免同步 I/O 阻塞
      2. 降低非关键路径的日志级别（生产环境用 WARN 而非 DEBUG）
      3. 使用**采样日志**（如每 100 次打印 1 次），减少日志量
      4. 对高频日志做**速率限制**（rate limiting）

  # ----------------------------------------------------------
  # GC / 内存回收
  # ----------------------------------------------------------
  - regex: ".*[Gg][Cc].*|.*_PyGC_.*|.*garbage.*collect.*|.*mark_sweep.*"
    advice: |
      GC/内存回收耗时较高，建议：
      1. 调大 GC 触发阈值（如 Go 的 `GOGC=200`，Java 的 `-XX:MaxHeapFreeRatio=70`）
      2. 使用**对象池**复用对象，减少 GC 压力
      3. 检查是否存在**循环引用**（Python `gc.collect()` 无法回收的情况）
      4. 对 Go 程序使用 `GOGC=off` + 手动 `runtime.GC()` 定时触发

  # ----------------------------------------------------------
  # 数据库操作
  # ----------------------------------------------------------
  - regex: ".*[Ss][Qq][Ll].*|.*mysql.*|.*postgres.*|.*PQexec.*|.*mysql_query.*"
    advice: |
      数据库操作可能成为瓶颈，建议：
      1. 通过 `EXPLAIN ANALYZE` 分析慢查询，**添加合适的索引**
      2. 使用**连接池**（PgBouncer / HikariCP）减少连接建立开销
      3. 使用**批量操作**（batch insert/update）替代逐条操作
      4. 考虑引入 **Redis** 缓存热点查询结果

  # ----------------------------------------------------------
  # 序列化
  # ----------------------------------------------------------
  - regex: ".*[Pp]rotobuf.*|.*[Pp]ickle.*|.*[Mm]arshal.*|.*serialize.*|.*encode.*"
    advice: |
      序列化/反序列化开销较大，建议：
      1. 使用 **protobuf** 或 **FlatBuffers**（零拷贝反序列化）替代 JSON
      2. 避免重复序列化相同数据，缓存序列化结果
      3. 对 Go 使用 `encoding/gob` 替代 `encoding/json`（快 3-5 倍）
      4. 考虑直接传递内存中的对象引用，避免序列化

  # ----------------------------------------------------------
  # 排序 / 查找
  # ----------------------------------------------------------
  - regex: ".*[Ss]ort.*|.*qsort.*|.*bsearch.*|.*[Ll]find.*"
    advice: |
      排序/查找算法耗时较高，建议：
      1. 确认数据规模是否适合当前算法（小数据用插入排序，大数据用快排/归并）
      2. 对已有序数据使用**二分查找**（O(log n)）替代线性查找（O(n)）
      3. 考虑使用**哈希表**（O(1) 平均）替代排序 + 二分查找（O(n log n) + O(log n)）

  # ----------------------------------------------------------
  # 文件 I/O
  # ----------------------------------------------------------
  - regex: ".*vfs_.*|.*ext4_.*|.*filemap_.*|.*generic_file_.*|.*do_sys_open.*"
    advice: |
      文件 I/O 占用较高，建议：
      1. 使用**内存映射**（mmap）替代 read/write，减少数据拷贝
      2. 增大 **readahead** 缓冲区（`blockdev --setra 4096 /dev/sda`）
      3. 对顺序大文件使用 **O_DIRECT** 绕过页缓存
      4. 使用 **io_uring** 或 **AIO** 实现异步文件 I/O

  # ----------------------------------------------------------
  # 数学计算
  # ----------------------------------------------------------
  - regex: ".*[Mm]ath.*|.*sqrt.*|.*sin.*|.*cos.*|.*exp.*|.*pow.*|.*log.*|.*__ieee754.*"
    advice: |
      数学运算密集，建议：
      1. 启用 **-ffast-math** 编译选项（允许近似计算，可提速 20-50%）
      2. 使用 **SIMD** 指令集（SSE/AVX）向量化计算
      3. 考虑用**查表法**替代复杂数学函数（如 sin/cos 预计算）
      4. 对 AI/ML 场景使用 GPU 或 NPU 加速
