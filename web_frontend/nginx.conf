# ============================================================
# nginx.conf — Nginx 配置（W5 生产版）
# ============================================================
# 职责：
#   1. 托管编译好的 React 静态文件（SPA 路由回退到 index.html）
#   2. 把 /api/ 请求代理到 apiserver
#   3. 静态资源长缓存（带 hash 的 JS/CSS）
#   4. 健康检查端点用于 Docker 探活
# ============================================================

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Docker 内置 DNS（解析 apiserver 等服务名）
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ---------- 健康检查（Docker 探活用） ----------
    location /health {
        access_log off;
        return 200 "OK";
    }

    # ---------- 静态资源长缓存 ----------
    # CRA 构建产物带 content hash，可以永久缓存
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # config.js 禁止缓存（部署时可替换 HOST_URL）
    location = /config.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ---------- API 代理 ----------
    # 使用变量方式 proxy_pass，nginx 启动时不解析 DNS，运行时解析
    location /api/ {
        set $apiserver "apiserver:8191";
        proxy_pass http://$apiserver;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 透传用户身份 Header（前端 axios 拦截器注入）
        proxy_pass_request_headers on;

        # 超时配置
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ---------- SPA 路由回退 ----------
    # 所有非静态资源请求都回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
