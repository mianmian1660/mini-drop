# ============================================================
# nginx.conf — Nginx 配置 小白版注释
# ============================================================
# Nginx 是一个高性能的 Web 服务器，这里用来：
#   1. 托管编译好的 React 静态文件（HTML/JS/CSS）
#   2. 把 /api/ 开头的请求转发给 Go 后台
#
# Nginx 语法小课堂：
#   server { }          = 定义一个虚拟主机
#   listen 80           = 监听 80 端口（HTTP 默认端口）
#   location /xxx { }   = 匹配某个 URL 路径的处理规则
#   proxy_pass          = 把请求转发到另一台服务器
# ============================================================

server {
    listen 80;                    # 监听 HTTP 80 端口
    server_name localhost;        # 域名（本地开发用 localhost）

    root /usr/share/nginx/html;   # 网页文件存放目录
    index index.html;             # 默认首页

    # ---------- 前端 SPA 路由 ----------
    # React 是单页应用（SPA），所有页面都由 index.html 承载
    # try_files：先找真实文件，找不到就返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- API 代理 ----------
    # 把 /api/ 开头的请求转发到 apiserver（Go 后台）
    # 比如：浏览器访问 /api/v1/tasks
    #   → Nginx 转发给 http://apiserver:8191/api/v1/tasks
    location /api/ {
        proxy_pass http://apiserver:8191;           # 转发目标
        proxy_set_header Host $host;                 # 保留原始域名
        proxy_set_header X-Real-IP $remote_addr;     # 传递真实客户端 IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
